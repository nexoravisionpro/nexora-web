<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXORA CORE | Ultra-Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg-dark: #030303;
            --glass: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100dvh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: fixed; /* Evita rebotes en iOS */
        }

        #neuron-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.6;
        }

        /* Contenedor Adaptativo Inteligente */
        .main-container {
            position: relative; z-index: 10;
            width: 100%; height: 100%;
            max-width: 1200px; /* PC */
            max-height: 950px;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; flex-direction: column;
            border: 1px solid var(--border);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.5);
        }

        /* Responsive para Móviles: Pantalla Completa */
        @media (max-width: 768px) {
            .main-container {
                height: 100dvh; border: none; border-radius: 0;
            }
        }

        /* Responsive para PC/Tablet: Ventana Flotante */
        @media (min-width: 769px) {
            .main-container {
                width: 90%; height: 90dvh; border-radius: 28px;
            }
        }

        .header {
            padding: 20px; text-align: center; flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: clamp(1rem, 4vw, 1.5rem);
            letter-spacing: 5px; margin: 0; color: var(--primary);
            text-transform: uppercase; font-weight: 700;
        }

        /* Área de Chat con Scroll Suave */
        .chat-display {
            flex: 1; overflow-y: auto; padding: clamp(15px, 5vw, 40px);
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        .user-bubble {
            font-family: 'JetBrains Mono', monospace; color: var(--primary);
            margin-bottom: 25px; font-size: 0.9rem; opacity: 0.8;
            padding-left: 10px; border-left: 2px solid var(--primary);
        }

        /* Formato de Respuesta Pro */
        .ai-response {
            font-size: clamp(0.95rem, 2.5vw, 1.05rem);
            line-height: 1.7; color: #e5e5e5; margin-bottom: 40px;
            max-width: 800px; /* Evita líneas demasiado largas en PC */
        }
        .ai-response p { margin-bottom: 1.5rem; }
        .ai-response strong { color: var(--primary); font-weight: 600; }
        .ai-response h3 { color: var(--primary); margin-top: 30px; font-size: 1.2rem; }
        .ai-response ul { padding-left: 20px; margin-bottom: 1.5rem; }
        .ai-response li { margin-bottom: 10px; }

        /* Barra de Entrada Adaptativa */
        .input-wrapper {
            padding: clamp(15px, 3vw, 25px);
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--border);
            padding-bottom: calc(clamp(15px, 3vw, 25px) + var(--safe-area-inset-bottom));
        }

        .input-group {
            display: flex; gap: 12px; max-width: 900px; margin: 0 auto;
        }

        input {
            flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
            padding: 16px 20px; border-radius: 16px; color: white;
            font-size: 16px; /* Evita zoom automático en iOS */
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        button {
            background: var(--primary); color: #000; border: none;
            padding: 0 25px; border-radius: 16px; font-weight: 700;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }

        @media (max-width: 480px) {
            button span { display: none; } /* Oculta texto en móviles muy pequeños */
            button::before { content: '→'; font-size: 1.5rem; }
        }

        .footer { font-size: 0.7rem; text-align: center; padding: 10px; opacity: 0.4; }
        .footer a { color: var(--primary); text-decoration: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="neuron-canvas"></canvas>

    <div class="main-container">
        <header class="header">
            <h1>NEXORA CORE</h1>
        </header>

        <main id="chatDisplay" class="chat-display">
            <div class="ai-response">
                <p><strong>> NÚCLEO ACTIVO.</strong> Sistema de análisis listo. La información se presentará en bloques optimizados para lectura corporativa.</p>
            </div>
        </main>

        <footer class="input-wrapper">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="Consultar a la red..." autocomplete="off">
                <button onclick="enviarMensaje()"><span>SECUENCIAR</span></button>
            </div>
            <div class="footer">
                POWERED BY <a href="https://nexoratechnologyc.netlify.app/" target="_blank">NEXORA TECHNOLOGY</a>
            </div>
        </footer>
    </div>

    <script>
        // --- MOTOR DE NEURONAS OPTIMIZADO ---
        const canvas = document.getElementById('neuron-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const count = canvas.width < 768 ? 40 : 100;
            particles = Array.from({length: count}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            }));
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx*=-1;
                if(p.y<0 || p.y>canvas.height) p.vy*=-1;
                ctx.fillStyle = '#00f2ff';
                ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI*2); ctx.fill();
            });
            particles.forEach((p1, i) => {
                particles.slice(i+1).forEach(p2 => {
                    const d = Math.hypot(p1.x-p2.x, p1.y-p2.y);
                    if(d < 150) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${0.15 - d/1000})`;
                        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();

        // --- FORMATEADOR DE TEXTO PROFESIONAL ---
        function parseResponse(text) {
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\* (.*$)/gim, '<li>$1</li>')
                .split('\n\n').map(p => {
                    if(p.includes('<li>')) return `<ul>${p}</ul>`;
                    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
                }).join('');
        }

        async function enviarMensaje() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chatDisplay');
            const txt = input.value.trim();
            if(!txt) return;

            display.innerHTML += `<div class="user-bubble">>> ${txt}</div>`;
            const loadId = "L" + Date.now();
            display.innerHTML += `<div id="${loadId}" class="ai-response"><strong>Sincronizando...</strong></div>`;
            input.value = '';
            display.scrollTop = display.scrollHeight;

            try {
                const r = await fetch('/api/api_nexora', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({mensaje_cliente: txt})
                });
                const d = await r.json();
                document.getElementById(loadId).remove();
                display.innerHTML += `<div class="ai-response">${parseResponse(d.respuesta)}</div>`;
            } catch {
                document.getElementById(loadId).innerHTML = "ERROR DE ENLACE.";
            }
            display.scrollTop = display.scrollHeight;
        }
        document.getElementById('userInput').addEventListener('keypress', e => e.key==='Enter' && enviarMensaje());
    </script>
</body>
</html>
