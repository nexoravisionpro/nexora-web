<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA CORE | Artificial Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Evita el scroll fuera del dashboard */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* El fondo de neuronas */
        #neuron-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .main-container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 900px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            letter-spacing: 5px;
            margin: 0;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        .chat-display {
            height: 350px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
            border-left: 3px solid var(--primary);
        }

        .input-group {
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        button {
            background: var(--primary);
            color: black;
            border: none;
            padding: 0 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .footer a:hover {
            text-decoration: underline;
            text-shadow: 0 0 5px var(--primary);
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="neuron-canvas"></canvas>

    <div class="main-container">
        <div class="header">
            <h1>NEXORA CORE</h1>
            <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem;">SISTEMA DE ANÁLISIS DE RED NEURONAL</p>
        </div>

        <div class="chat-display" id="chatDisplay">
            > SISTEMA LISTO PARA SECUENCIAR...
        </div>

        <div class="input-group">
            <input type="text" id="userInput" placeholder="Ingresa consulta lógica o síntoma corporativo...">
            <button onclick="enviarMensaje()">SECUENCIAR</button>
        </div>

        <div class="footer">
            DESARROLLADO POR <a href="https://nexora.com.mx" target="_blank">NEXORA TECHNOLOGY</a>
        </div>
    </div>

    <script>
        // LÓGICA DEL CANVAS DE NEURONAS (Partículas)
        const canvas = document.getElementById('neuron-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = '#00f2ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - distance/150})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            connect();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        createParticles();
        animate();

        // LÓGICA DE LA IA (Ajustada a tu ruta de Vercel)
        async function enviarMensaje() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chatDisplay');
            const msj = input.value;

            if (!msj) return;

            display.innerHTML += `<br><br><span style="color:var(--primary)">USUARIO:</span> ${msj}`;
            display.innerHTML += `<br><br><span style="color:#aaa">NEXORA CORE:</span> Procesando sinapsis...`;
            input.value = '';

            try {
                const response = await fetch('/api/api_nexora', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje_cliente: msj })
                });

                const data = await response.json();
                display.innerHTML = display.innerHTML.replace("Procesando sinapsis...", "");
                display.innerHTML += `<br>${data.respuesta}`;
                display.scrollTop = display.scrollHeight;

            } catch (error) {
                display.innerHTML += `<br>ERROR EN LA RED NEURONAL. REINTENTE.`;
            }
        }
    </script>
</body>
</html>
